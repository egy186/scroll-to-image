name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    if: github.repository == 'egy186/scroll-to-image'
    runs-on: ubuntu-latest
    environment: release
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Install
      run: npm ci

    - name: Sign
      run: npm run release
      env:
        API_KEY: ${{ secrets.API_KEY }}
        API_SECRET: ${{ secrets.API_SECRET }}

    - name: Publish
      run: gh release create "${{ github.ref_name }}" web-ext-artifacts/*.xpi --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
